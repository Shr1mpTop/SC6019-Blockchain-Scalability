<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SC6019 区块链可扩展性刷题速记</title>
  <style>
    :root {
      --ink: #18202a;
      --muted: #637083;
      --line: #d9e1ea;
      --paper: #f7f8f5;
      --panel: #ffffff;
      --blue: #2457d6;
      --green: #178066;
      --red: #bd3b45;
      --gold: #a56708;
      --violet: #6d4bc3;
      --shadow: 0 14px 40px rgba(26, 37, 55, 0.10);
      --shadow-strong: 0 22px 60px rgba(26, 37, 55, 0.16);
      --sidebar: clamp(350px, 24vw, 390px);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      background:
        linear-gradient(90deg, rgba(36, 87, 214, 0.06), transparent 30%),
        linear-gradient(180deg, #fbfaf4 0%, var(--paper) 55%, #f1f5f3 100%);
      min-height: 100vh;
    }

    button, input { font: inherit; }
    button {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--ink);
      border-radius: 8px;
      min-height: 38px;
      padding: 8px 12px;
      cursor: pointer;
      transition: transform .16s ease, border-color .16s ease, background .16s ease, box-shadow .16s ease;
    }
    button:hover { transform: translateY(-1px); border-color: #9fb2c8; box-shadow: 0 8px 18px rgba(32, 45, 66, .08); }
    button:disabled { cursor: default; opacity: .55; transform: none; }

    .app {
      display: grid;
      grid-template-columns: var(--sidebar) minmax(0, 1fr);
      min-height: 100vh;
    }

    aside {
      border-right: 1px solid var(--line);
      padding: 26px;
      background: rgba(255, 255, 255, 0.82);
      backdrop-filter: blur(18px);
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: auto;
      animation: fadeSlide .48s ease both;
    }

    main {
      padding: 30px;
      max-width: 1260px;
      width: 100%;
      margin: 0 auto;
      animation: fadeUp .5s ease .08s both;
    }

    .brand {
      display: grid;
      gap: 8px;
      margin-bottom: 18px;
    }
    .brand h1 {
      font-size: 22px;
      line-height: 1.15;
      margin: 0;
      letter-spacing: 0;
    }
    .brand p {
      color: var(--muted);
      margin: 0;
      line-height: 1.55;
      font-size: 14px;
    }

    .memory-map {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
      margin: 20px 0;
    }
    .node {
      min-height: 66px;
      border-radius: 8px;
      padding: 10px 8px;
      border: 1px solid var(--line);
      background: #fff;
      display: grid;
      align-content: center;
      gap: 2px;
      box-shadow: 0 8px 18px rgba(31, 43, 61, .06);
      animation: floatIn .46s ease both;
      transition: transform .18s ease, box-shadow .18s ease;
    }
    .node:hover { transform: translateY(-3px); box-shadow: 0 12px 24px rgba(31, 43, 61, .11); }
    .node strong { font-size: 20px; line-height: 1; }
    .node span { font-size: 12px; color: var(--muted); line-height: 1.25; }
    .node:nth-child(1) { border-top: 4px solid var(--gold); }
    .node:nth-child(2) { border-top: 4px solid var(--green); }
    .node:nth-child(3) { border-top: 4px solid var(--blue); }
    .node:nth-child(4) { border-top: 4px solid var(--violet); }
    .node:nth-child(5) { border-top: 4px solid var(--red); }
    .node:nth-child(2) { animation-delay: .04s; }
    .node:nth-child(3) { animation-delay: .08s; }
    .node:nth-child(4) { animation-delay: .12s; }
    .node:nth-child(5) { animation-delay: .16s; }

    .filters, .nav, .stats {
      display: grid;
      gap: 10px;
      margin-top: 18px;
      padding: 14px;
      border: 1px solid rgba(217, 225, 234, .82);
      border-radius: 8px;
      background: rgba(255, 255, 255, .78);
    }
    .label {
      font-size: 12px;
      color: var(--muted);
      font-weight: 700;
      text-transform: uppercase;
    }
    .seg {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 7px;
    }
    .seg button.active, .nav button.active {
      background: #17202c;
      color: #fff;
      border-color: #17202c;
    }
    .nav button {
      text-align: left;
      display: grid;
      gap: 2px;
      min-height: 52px;
      align-content: center;
    }
    .nav small { color: inherit; opacity: .7; }

    .stats {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }
    .meter {
      height: 8px;
      border-radius: 999px;
      background: #e4e9ef;
      overflow: hidden;
    }
    .meter span {
      display: block;
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--green), var(--blue));
      transition: width .38s cubic-bezier(.2, .8, .2, 1);
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1.25fr) minmax(280px, .75fr);
      gap: 18px;
      align-items: stretch;
      margin-bottom: 18px;
    }
    .hero-text {
      padding: 24px 0;
      min-height: 180px;
      display: grid;
      align-content: center;
      gap: 12px;
    }
    .hero h2 {
      margin: 0;
      font-size: clamp(30px, 4vw, 54px);
      line-height: 1.05;
      letter-spacing: 0;
    }
    .hero p {
      margin: 0;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.7;
      max-width: 780px;
    }
    .diagram {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 8px;
      padding: 16px;
      display: grid;
      gap: 10px;
      align-content: center;
      box-shadow: var(--shadow);
      animation: fadeUp .55s ease .14s both;
    }
    .lane {
      display: grid;
      grid-template-columns: 88px 1fr;
      gap: 10px;
      align-items: center;
      min-height: 38px;
    }
    .lane b { font-size: 13px; }
    .bar {
      height: 14px;
      border-radius: 999px;
      background: #e8edf2;
      overflow: hidden;
    }
    .bar span {
      display: block;
      height: 100%;
      border-radius: inherit;
      transform-origin: left center;
      animation: growX .8s cubic-bezier(.18, .82, .18, 1) both;
    }
    .bar-a { width: 28%; background: var(--gold); }
    .bar-b { width: 58%; background: var(--blue); }
    .bar-c { width: 76%; background: var(--green); }
    .bar-d { width: 68%; background: var(--violet); }
    .bar-e { width: 52%; background: var(--red); }

    .top-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }
    .primary {
      background: var(--blue);
      color: white;
      border-color: var(--blue);
    }
    .danger {
      color: var(--red);
      border-color: rgba(189, 59, 69, .35);
    }

    .study-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(330px, 360px);
      gap: 18px;
      align-items: start;
    }
    .panel {
      background: rgba(255, 255, 255, 0.88);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      transition: transform .2s ease, box-shadow .2s ease, border-color .2s ease;
    }
    .panel:hover { box-shadow: var(--shadow-strong); }
    .quiz-panel { padding: 22px; }
    .quiz-panel.question-pop { animation: questionPop .28s ease both; }
    .side-panel { padding: 18px; display: grid; gap: 16px; }

    .q-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 12px;
    }
    .pill {
      border-radius: 999px;
      padding: 5px 9px;
      background: #eef3f8;
      color: #344255;
      font-size: 12px;
      white-space: nowrap;
    }
    .question {
      font-size: 22px;
      line-height: 1.45;
      margin: 0 0 16px;
      letter-spacing: 0;
    }
    .options {
      display: grid;
      gap: 10px;
      margin: 16px 0;
    }
    .option {
      width: 100%;
      min-height: 48px;
      text-align: left;
      display: grid;
      grid-template-columns: 28px 1fr;
      gap: 10px;
      align-items: center;
      border-radius: 8px;
      background: #fff;
      animation: optionIn .24s ease both;
    }
    .option:nth-child(2) { animation-delay: .03s; }
    .option:nth-child(3) { animation-delay: .06s; }
    .option:nth-child(4) { animation-delay: .09s; }
    .option .mark {
      width: 24px;
      height: 24px;
      border-radius: 6px;
      display: grid;
      place-items: center;
      background: #edf2f6;
      color: #526074;
      font-weight: 800;
      font-size: 12px;
    }
    .option.selected {
      border-color: var(--blue);
      background: #f2f6ff;
      transform: translateX(4px);
    }
    .option.correct {
      border-color: var(--green);
      background: #effaf6;
      animation: correctPulse .42s ease both;
    }
    .option.wrong {
      border-color: var(--red);
      background: #fff1f2;
      animation: wrongShake .34s ease both;
    }
    .fill-input {
      width: 100%;
      min-height: 48px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px 14px;
      background: #fff;
      color: var(--ink);
      outline: none;
    }
    .fill-input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(36, 87, 214, .12); }
    .feedback {
      border-left: 4px solid var(--line);
      padding: 12px 14px;
      background: #fbfcfd;
      border-radius: 6px;
      line-height: 1.65;
      color: #334155;
      display: none;
    }
    .feedback.show { display: block; }
    .feedback.good { border-color: var(--green); }
    .feedback.bad { border-color: var(--red); }
    .controls {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    .memo-block h3, .wrong-block h3 {
      margin: 0 0 8px;
      font-size: 16px;
    }
    .memo {
      display: grid;
      gap: 8px;
    }
    .memo-line {
      border-left: 4px solid var(--green);
      padding: 8px 10px;
      background: #f6fbf8;
      border-radius: 6px;
      line-height: 1.55;
      font-size: 14px;
      animation: fadeUp .28s ease both;
    }
    .wrong-list {
      display: grid;
      gap: 8px;
      max-height: 360px;
      overflow: auto;
    }
    .wrong-item {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      background: #fff;
      font-size: 13px;
      line-height: 1.5;
    }

    .cheatsheet {
      margin-top: 18px;
      padding: 18px;
    }
    .cheatsheet h3 { margin: 0 0 12px; }
    .chips {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .chip {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 999px;
      padding: 7px 10px;
      font-size: 13px;
      color: #354154;
      transition: transform .16s ease, border-color .16s ease, background .16s ease;
    }
    .chip:hover { transform: translateY(-2px); border-color: #9fb2c8; background: #f8fbff; }

    @keyframes fadeSlide {
      from { opacity: 0; transform: translateX(-14px); }
      to { opacity: 1; transform: translateX(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes floatIn {
      from { opacity: 0; transform: translateY(10px) scale(.97); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes growX {
      from { transform: scaleX(.08); }
      to { transform: scaleX(1); }
    }

    @keyframes optionIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes questionPop {
      from { opacity: .72; transform: translateY(6px) scale(.995); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes correctPulse {
      0% { transform: translateX(4px) scale(1); }
      45% { transform: translateX(4px) scale(1.012); }
      100% { transform: translateX(4px) scale(1); }
    }

    @keyframes wrongShake {
      0%, 100% { transform: translateX(4px); }
      25% { transform: translateX(0); }
      50% { transform: translateX(7px); }
      75% { transform: translateX(2px); }
    }

    @media (max-width: 920px) {
      .app { grid-template-columns: 1fr; }
      aside {
        position: static;
        height: auto;
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }
      main { padding: 18px; }
      .hero, .study-grid { grid-template-columns: 1fr; }
      .memory-map { grid-template-columns: repeat(5, minmax(56px, 1fr)); }
      .nav { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .nav .label { grid-column: 1 / -1; }
    }

    @media (max-width: 560px) {
      aside, main { padding: 14px; }
      .hero h2 { font-size: 32px; }
      .question { font-size: 18px; }
      .memory-map { grid-template-columns: repeat(3, 1fr); }
      .seg { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .nav { grid-template-columns: 1fr; }
      .lane { grid-template-columns: 74px 1fr; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: .01ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
        transition-duration: .01ms !important;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside>
      <div class="brand">
        <h1>SC6019 速记刷题台</h1>
        <p>基于 Lecture 07-11 Markdown 笔记整理：先记框架，再刷基础题，最后盯错题。</p>
      </div>

      <div class="memory-map" aria-label="五讲助记图">
        <div class="node"><strong>基</strong><span>三难与瓶颈</span></div>
        <div class="node"><strong>分</strong><span>L1 分片</span></div>
        <div class="node"><strong>通</strong><span>通道/Plasma</span></div>
        <div class="node"><strong>卷</strong><span>OP/ZK Rollup</span></div>
        <div class="node"><strong>数</strong><span>DA/EVM/共识</span></div>
      </div>

      <div class="filters">
        <div class="label">题型</div>
        <div class="seg" id="typeFilters"></div>
      </div>

      <div class="filters">
        <div class="label">重要程度</div>
        <div class="seg" id="levelFilters"></div>
      </div>

      <div class="nav">
        <div class="label">章节</div>
        <button class="active" data-lecture="all">全部章节<small>混合刷题</small></button>
        <button data-lecture="L07">Lecture 07<small>可扩展性导论</small></button>
        <button data-lecture="L08">Lecture 08<small>分片与互操作</small></button>
        <button data-lecture="L09">Lecture 09<small>通道与 Plasma</small></button>
        <button data-lecture="L10">Lecture 10<small>Rollup 与 ZK</small></button>
        <button data-lecture="L11">Lecture 11<small>DA、EVM、共识</small></button>
      </div>

      <div class="stats">
        <div><strong id="scoreText">0 / 0</strong> 已答正确</div>
        <div class="meter"><span id="scoreBar"></span></div>
        <div id="poolText">题库载入中</div>
      </div>
    </aside>

    <main>
      <section class="hero">
        <div class="hero-text">
          <h2>基分通卷数，一遍抓住扩容主线</h2>
          <p>口诀：基看三难，分靠分片，通把交易搬下链，卷把数据和证明交回 L1，数再补齐数据可用性、EVM 并行和共识边界。</p>
        </div>
        <div class="diagram" aria-label="课程主线图">
          <div class="lane"><b>吞吐</b><div class="bar"><span class="bar-a"></span></div></div>
          <div class="lane"><b>分片</b><div class="bar"><span class="bar-b"></span></div></div>
          <div class="lane"><b>Layer 2</b><div class="bar"><span class="bar-c"></span></div></div>
          <div class="lane"><b>Rollup</b><div class="bar"><span class="bar-d"></span></div></div>
          <div class="lane"><b>DA/共识</b><div class="bar"><span class="bar-e"></span></div></div>
        </div>
      </section>

      <div class="top-actions">
        <button class="primary" id="shuffleBtn">随机下一题</button>
        <button id="wrongOnlyBtn">只刷错题</button>
        <button id="resetBtn" class="danger">清空进度</button>
      </div>

      <section class="study-grid">
        <div class="panel quiz-panel">
          <div class="q-head">
            <span id="qMeta">准备开始</span>
            <span class="pill" id="qType">题型</span>
          </div>
          <h3 class="question" id="qText">点击“随机下一题”开始刷题。</h3>
          <div id="answerArea"></div>
          <div class="feedback" id="feedback"></div>
          <div class="controls">
            <button class="primary" id="submitBtn">提交答案</button>
            <button id="showBtn">看答案</button>
            <button id="nextBtn">下一题</button>
          </div>
        </div>

        <div class="panel side-panel">
          <div class="memo-block">
            <h3>本章助记</h3>
            <div class="memo" id="memoList"></div>
          </div>
          <div class="wrong-block">
            <h3>错题本</h3>
            <div class="wrong-list" id="wrongList"></div>
          </div>
        </div>
      </section>

      <section class="panel cheatsheet">
        <h3>高频词一眼过</h3>
        <div class="chips" id="chips"></div>
      </section>
    </main>
  </div>

  <script>
    const lectures = {
      L07: {
        title: "Lecture 07 可扩展性导论",
        memo: [
          "三难：去中心化、安全性、可扩展性，通常不能三者同时最大化。",
          "TPS 不是全部：区块越大、出块越快，常会推高硬件门槛或增加分叉。",
          "Gas 费用 = Gas used × Gas price；拥堵来自区块空间供不应求。"
        ],
        chips: ["TPS", "Gas", "Mempool", "Blockchain Trilemma", "CAP", "Ronin Sidechain", "Computational Integrity"]
      },
      L08: {
        title: "Lecture 08 L1 分片与互操作",
        memo: [
          "分片口诀：分工并行，但要随机分配、周期洗牌、处理跨片原子性。",
          "Beacon Chain 负责随机性、跨片协调和聚合；Shard Chain 做局部执行与共识。",
          "互操作像状态分片：Cosmos Hub/Zone、Polkadot Relay/Parachain 都是多链协作。"
        ],
        chips: ["Sharding", "Beacon Chain", "Shard Key", "Cross-link", "VRF", "PBFT", "IBC", "Tendermint"]
      },
      L09: {
        title: "Lecture 09 通道与 Plasma",
        memo: [
          "Layer 2 省钱靠摊薄：1 笔进场，很多笔链下更新，1 笔退出。",
          "通道靠双方签名和最新状态；HTLC 靠哈希锁加时间锁做多跳支付。",
          "Plasma 只把状态承诺放上链，用户要保存数据并在退出游戏中自证。"
        ],
        chips: ["State Channel", "Payment Channel", "Spilman", "Lightning", "HTLC", "Virtual Channel", "Commit-chain", "Plasma Cash"]
      },
      L10: {
        title: "Lecture 10 Rollup 与 ZK",
        memo: [
          "OP Rollup：乐观执行，靠欺诈证明纠错，数据仍放 L1。",
          "ZK Rollup：提交有效性证明，数学保证状态正确，退出通常更快。",
          "Rollup 省 Gas：批处理、压缩、calldata，再到 EIP-4844 blobs。"
        ],
        chips: ["Optimistic Rollup", "Fraud Proof", "ZK Rollup", "Validity Proof", "SNARK", "STARK", "Cairo", "zkEVM", "Blobs"]
      },
      L11: {
        title: "Lecture 11 DA、EVM 与共识扩展",
        memo: [
          "DA 问的不是数据对不对，而是数据是否真的可取得、可重建。",
          "EVM 并行要知道读写集合；Block-STM 先乐观执行，再验证冲突。",
          "容错边界要记牢：CFT 通常 n ≥ 2f+1，BFT 通常 n ≥ 3f+1。"
        ],
        chips: ["Data Availability", "DAS", "Erasure Coding", "Reed-Solomon", "CMT", "Celestia", "Block-STM", "HotStuff"]
      }
    };

    const questions = [
      {
        id: "l07-1", lecture: "L07", type: "single",
        q: "Lecture 07 中，朴素提高区块链吞吐量的公式是哪一个？",
        options: ["吞吐量 = 每块交易数 / 出块间隔", "吞吐量 = Gas 价格 × 出块间隔", "吞吐量 = 节点数量 / 区块大小", "吞吐量 = 安全性 × 去中心化"],
        answer: [0],
        exp: "课件把区块链抽象成处理交易的服务，吞吐量常用每个区块可容纳交易数除以出块间隔来表达。"

    const levelLabels = { core: "核心", important: "重要", advanced: "拓展" };
    const levelButtons = [
      ["all", "全部"], ["core", "核心"], ["important", "重要"], ["advanced", "拓展"]
    ];
    const levelOverrides = {
      "l07-1": "core", "l07-2": "core", "l07-3": "core", "l07-4": "core", "l07-5": "important", "l07-6": "core",
      "l08-1": "core", "l08-2": "core", "l08-3": "core", "l08-4": "important", "l08-5": "important", "l08-6": "core", "l08-7": "important",
      "l09-1": "core", "l09-2": "core", "l09-3": "core", "l09-4": "important", "l09-5": "important", "l09-6": "core",
      "l10-1": "core", "l10-2": "important", "l10-3": "core", "l10-4": "core", "l10-5": "important", "l10-6": "important", "l10-7": "advanced",
      "l11-1": "core", "l11-2": "core", "l11-3": "important", "l11-4": "core", "l11-5": "important", "l11-6": "core", "l11-7": "important"
    };
    questions.forEach(q => { q.level = levelOverrides[q.id] || "important"; });
    questions.push(...additionalQuestions);

    const typeLabels = { single: "单选", multi: "多选", fill: "填空" };
    const typeButtons = [
      ["all", "全部"], ["single", "单选"], ["multi", "多选"], ["fill", "填空"]
    ];

    let state = JSON.parse(localStorage.getItem("sc6019-progress") || "{}");
    if (!state.done) state = { done: {}, wrong: {}, currentLecture: "all", currentType: "all", wrongOnly: false };
    if (!state.currentLevel) state.currentLevel = "all";
    let current = null;
    let selected = new Set();
    let answered = false;

    const $ = (id) => document.getElementById(id);
    const normalize = (s) => String(s).trim().replace(/\s+/g, " ").toLowerCase();

    function save() {
      localStorage.setItem("sc6019-progress", JSON.stringify(state));
    }

    function initFilters() {
      $("typeFilters").innerHTML = typeButtons.map(([key, label]) =>
        `<button data-type="${key}" class="${key === state.currentType ? "active" : ""}">${label}</button>`
      ).join("");
      $("typeFilters").querySelectorAll("button").forEach(btn => {
        btn.addEventListener("click", () => {
          state.currentType = btn.dataset.type;
          state.wrongOnly = false;
          save();
          refreshActive();
          pickQuestion();
        });
      });

      $("levelFilters").innerHTML = levelButtons.map(([key, label]) =>
        `<button data-level="${key}" class="${key === state.currentLevel ? "active" : ""}">${label}</button>`
      ).join("");
      $("levelFilters").querySelectorAll("button").forEach(btn => {
        btn.addEventListener("click", () => {
          state.currentLevel = btn.dataset.level;
          state.wrongOnly = false;
          save();
          refreshActive();
          pickQuestion();
        });
      });

      document.querySelectorAll(".nav button").forEach(btn => {
        btn.addEventListener("click", () => {
          state.currentLecture = btn.dataset.lecture;
          state.wrongOnly = false;
          save();
          refreshActive();
          pickQuestion();
        });
      });
    }

    function pool() {
      return questions.filter(q => {
        const lectureOk = state.currentLecture === "all" || q.lecture === state.currentLecture;
        const typeOk = state.currentType === "all" || q.type === state.currentType;
        const levelOk = state.currentLevel === "all" || q.level === state.currentLevel;
        const wrongOk = !state.wrongOnly || state.wrong[q.id];
        return lectureOk && typeOk && levelOk && wrongOk;
      });
    }

    function refreshActive() {
      document.querySelectorAll(".nav button").forEach(btn => {
        btn.classList.toggle("active", btn.dataset.lecture === state.currentLecture);
      });
      $("typeFilters").querySelectorAll("button").forEach(btn => {
        btn.classList.toggle("active", btn.dataset.type === state.currentType);
      });
      $("levelFilters").querySelectorAll("button").forEach(btn => {
        btn.classList.toggle("active", btn.dataset.level === state.currentLevel);
      });
      $("wrongOnlyBtn").classList.toggle("primary", state.wrongOnly);
      updateMemo();
      updateStats();
    }

    function updateStats() {
      const doneEntries = Object.values(state.done);
      const totalDone = doneEntries.length;
      const correct = doneEntries.filter(Boolean).length;
      const pct = totalDone ? Math.round(correct / totalDone * 100) : 0;
      $("scoreText").textContent = `${correct} / ${totalDone}`;
      $("scoreBar").style.width = `${pct}%`;
      $("poolText").textContent = `当前题池 ${pool().length} 题，错题 ${Object.keys(state.wrong).length} 题`;
      renderWrongList();
    }

    function updateMemo() {
      const keys = state.currentLecture === "all" ? Object.keys(lectures) : [state.currentLecture];
      const memo = keys.flatMap(k => lectures[k].memo.slice(0, state.currentLecture === "all" ? 1 : 3));
      $("memoList").innerHTML = memo.map(line => `<div class="memo-line">${line}</div>`).join("");
      const chips = keys.flatMap(k => lectures[k].chips);
      $("chips").innerHTML = [...new Set(chips)].map(c => `<span class="chip">${c}</span>`).join("");
    }

    function renderWrongList() {
      const wrongIds = Object.keys(state.wrong);
      if (!wrongIds.length) {
        $("wrongList").innerHTML = `<div class="wrong-item">目前没有错题。保持这个节奏。</div>`;
        return;
      }
      $("wrongList").innerHTML = wrongIds.map(id => {
        const q = questions.find(item => item.id === id);
        if (!q) return "";
        return `<button class="wrong-item" data-jump="${q.id}"><strong>${lectures[q.lecture].title} · ${levelLabels[q.level] || "重要"}</strong><br>${q.q}</button>`;
      }).join("");
      $("wrongList").querySelectorAll("[data-jump]").forEach(btn => {
        btn.addEventListener("click", () => renderQuestion(questions.find(q => q.id === btn.dataset.jump)));
      });
    }

    function pickQuestion() {
      const list = pool();
      if (!list.length) {
        current = null;
        $("qMeta").textContent = "没有符合筛选条件的题";
        $("qType").textContent = "空";
        $("qText").textContent = state.wrongOnly ? "错题池为空。可以关闭“只刷错题”继续练习。" : "当前筛选没有题目。";
        $("answerArea").innerHTML = "";
        $("feedback").className = "feedback";
        return;
      }
      const unseen = list.filter(q => state.done[q.id] === undefined);
      const source = unseen.length ? unseen : list;
      renderQuestion(source[Math.floor(Math.random() * source.length)]);
    }

    function renderQuestion(q) {
      current = q;
      selected = new Set();
      answered = false;
      const quizPanel = document.querySelector(".quiz-panel");
      quizPanel.classList.remove("question-pop");
      void quizPanel.offsetWidth;
      quizPanel.classList.add("question-pop");
      $("qMeta").textContent = `${lectures[q.lecture].title} · ${q.id}`;
      $("qType").textContent = `${typeLabels[q.type]} · ${levelLabels[q.level] || "重要"}`;
      $("qText").textContent = q.q;
      $("feedback").className = "feedback";
      $("feedback").textContent = "";

      if (q.type === "fill") {
        $("answerArea").innerHTML = `<input class="fill-input" id="fillAnswer" placeholder="输入关键词或数值">`;
        $("fillAnswer").addEventListener("keydown", e => {
          if (e.key === "Enter") checkAnswer();
        });
      } else {
        $("answerArea").innerHTML = `<div class="options">${q.options.map((opt, i) => `
          <button class="option" data-opt="${i}">
            <span class="mark">${String.fromCharCode(65 + i)}</span>
            <span>${opt}</span>
          </button>
        `).join("")}</div>`;
        $("answerArea").querySelectorAll(".option").forEach(btn => {
          btn.addEventListener("click", () => {
            if (answered) return;
            const idx = Number(btn.dataset.opt);
            if (q.type === "single") {
              selected = new Set([idx]);
            } else {
              selected.has(idx) ? selected.delete(idx) : selected.add(idx);
            }
            paintSelection();
          });
        });
      }
      updateStats();
    }

    function paintSelection() {
      document.querySelectorAll(".option").forEach(btn => {
        btn.classList.toggle("selected", selected.has(Number(btn.dataset.opt)));
      });
    }

    function correctText(q) {
      if (q.type === "fill") return q.answers[0];
      return q.answer.map(i => `${String.fromCharCode(65 + i)}. ${q.options[i]}`).join("；");
    }

    function isCorrect() {
      if (!current) return false;
      if (current.type === "fill") {
        const value = normalize($("fillAnswer")?.value || "");
        return current.answers.map(normalize).includes(value);
      }
      const ans = [...current.answer].sort().join(",");
      const got = [...selected].sort().join(",");
      return ans === got;
    }

    function checkAnswer(showOnly = false) {
      if (!current) return;
      answered = true;
      const ok = showOnly ? false : isCorrect();

      if (current.type !== "fill") {
        document.querySelectorAll(".option").forEach(btn => {
          const idx = Number(btn.dataset.opt);
          btn.classList.toggle("correct", current.answer.includes(idx));
          btn.classList.toggle("wrong", selected.has(idx) && !current.answer.includes(idx));
        });
      }

      if (!showOnly) {
        state.done[current.id] = ok;
        if (ok) delete state.wrong[current.id];
        else state.wrong[current.id] = true;
        save();
      }

      $("feedback").className = `feedback show ${ok ? "good" : "bad"}`;
      $("feedback").innerHTML = `${ok ? "答对了。" : "正确答案："}${ok ? "" : `<strong>${correctText(current)}</strong>`}<br>${current.exp}`;
      updateStats();
    }

    $("submitBtn").addEventListener("click", () => checkAnswer(false));
    $("showBtn").addEventListener("click", () => checkAnswer(true));
    $("nextBtn").addEventListener("click", pickQuestion);
    $("shuffleBtn").addEventListener("click", pickQuestion);
    $("wrongOnlyBtn").addEventListener("click", () => {
      state.wrongOnly = !state.wrongOnly;
      save();
      refreshActive();
      pickQuestion();
    });
    $("resetBtn").addEventListener("click", () => {
      if (!confirm("确定清空答题进度和错题本？")) return;
      state.done = {};
      state.wrong = {};
      state.wrongOnly = false;
      save();
      refreshActive();
      pickQuestion();
    });

    initFilters();
    refreshActive();
    pickQuestion();
  </script>
</body>
</html>
